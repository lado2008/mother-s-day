<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>დედის დღე</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="intro-overlay" id="intro">
    <div class="intro-box">
      <div class="intro-crown">💜</div>
      <p class="intro-text">დედისთვის</p>
      <button class="enter-btn" id="enterBtn">გახსენი ბარათი ✨</button>
      <p style="margin-top: 20px; color: white;">ტელეფონს ხმა აუწიე</p>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music/music.mp3" type="audio/mpeg">
  </audio>

  <div id="hearts"></div>
  <div id="flowers"></div>

  <main class="card">
    <div class="crown">🌺</div>
    <h1 class="title">გილოცავ<br/>დედის დღეს!</h1>
    <div class="divider"><span>✦</span><span>✦</span><span>✦</span></div>
    <img src="images/Teddy Bear.gif" alt="gif" class="card-gif" />
    <p class="signature">გიყვარხარ, ძალიან</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
